name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate dark mode stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats-dark
          options: username=${{ github.repository_owner }}&show_icons=true&theme=one_dark_pro&hide=prs,issues
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate light mode stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats-light
          options: username=${{ github.repository_owner }}&show_icons=true&theme=buefy&hide=prs,issues
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dark mode top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs-dark
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=one_dark_pro&layout=donut
          path: profile/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate light mode top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs-light
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=buefy&layout=donut
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
